<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-purple-900 to-slate-800">

        

    <div class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl shadow-2xl p-10 w-full max-w-5xl">
        <h1 class="text-4xl font-bold text-center text-white mb-8">
            Expense Tracker Pro
        </h1>
        
        <div class="bg-slate-800 rounded-xl grid grid-cols-1 sm:grid-cols-2 gap-6 p-8 shadow-md mb-5 text-center sm:text-left">
    
        <!-- Card 1: Total Expenses -->
        <div class="border-b border-slate-700 sm:border-b-0 pb-4 sm:pb-0">
            <h2 class="text-gray-300 text-lg font-medium">Total Expenses</h2>
            <h1 id="totalExpense" class="text-4xl font-bold text-green-400 mt-2">
                ₱ 0.00
            </h1>
        </div>

        <!-- Card 2: Transactions -->
        <div class="border-b border-slate-700 sm:border-b-0 pb-4 sm:pb-0">
            <h2 class="text-gray-300 text-lg font-medium">Transactions</h2>
            <h1 id="transactionCount" class="text-4xl font-bold text-green-400 mt-2">
                0
            </h1>
        </div>

        <!-- Card 3: Highest Expense -->
        <div class="border-b border-slate-700 sm:border-b-0 pb-4 sm:pb-0">
            <h2 class="text-gray-300 text-lg font-medium">Highest Expense</h2>
            <h1 id="highestExpense" class="text-4xl font-bold text-green-400 mt-2">
                ₱ 0.00
            </h1>
        </div>

        <!-- Card 4: Average Expense -->
        <div>
            <h2 class="text-gray-300 text-lg font-medium">Average Expense</h2>
            <h1 id="averageExpense" class="text-4xl font-bold text-green-400 mt-2">
                ₱ 0.00
            </h1>
        </div>

    </div>

    <div class="bg-slate-800 rounded-xl p-6 shadow-md mb-6">
        <h2 class="text-xl text-green-400 font-semibold mb-4 text-center">
            Expenses by Category
        </h2>
<div id="chartWrapper" class="w-full h-[350px]">
        <div id="chartEmptyState"
            class="flex flex-col items-center justify-center h-[300px] text-slate-400 animate-pulse">
            <div class="bg-slate-700/40 p-4 rounded-full mb-3">
                <svg xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.5"
                    stroke="currentColor"
                    class="w-12 h-12 text-slate-500">
                    <path stroke-linecap="round"
                        stroke-linejoin="round"
                        d="M3 3v18h18M7.5 14.25l3-3 2.25 2.25 4.5-6" />
                </svg>
            </div>

            <p class="text-lg font-medium">No expense data yet</p>
            <p class="text-sm text-slate-500">Add your first expense to see the chart.</p>
        </div>

            <canvas id="expenseChart"></canvas>
        </div>
</div>
        

        <div class="space-y-4">
            <input
                type="text"
                id="expenseName-input"
                placeholder="Expense Name"
                class="w-full p-3 rounded-xl bg-white/20 text-white placeholder-white/70 
                border border-white/20 focus:outline-none focus:ring-2 focus:ring-green-400
                hover:bg-slate-200/30 transition select-none hover:scale-[1.03]">

            <input
                type="number"
                id="amount-input"
                placeholder="Amount"
                class="w-full p-3 rounded-xl bg-white/20 text-white placeholder-white/70 border
                border-white/20 focus:outline-none focus:ring-2 focus:ring-green-400
                hover:bg-slate-200/30 transition select-none hover:scale-[1.03]">

            <select
                id="category-input"
                class="w-full p-3 rounded-xl bg-white/20 border-white/20 text-white focus:outline-none 
                focus:ring-2 focus:ring-green-400
                hover:bg-slate-200/30 transition select-none hover:scale-[1.03]">
                <option class = "bg-slate-800 text-white" hidden selected>Category</option>
                <option class = "bg-slate-800 text-white" value="Food">Food</option>
                <option class = "bg-slate-800 text-white" value="Transportation">Transportation</option>
                <option class = "bg-slate-800 text-white"value="Bills">Bills</option>
                <option class = "bg-slate-800 text-white" value="Shopping">Shopping</option>
            </select>

            <input
                type="date"
                id="date-input"
                class="w-full p-3 rounded-xl bg-white/20 text-white placeholder-white/70 border 
                border-white/20 focus:outline-none focus:ring-2 focus:ring-green-400
                hover:bg-slate-200/30 transition select-none hover:scale-[1.03]">

            <button
                id="expenseBtn-input"
                class="w-full bg-green-600 text-white font-bold p-3 rounded-xl transition 
                duration-300 ease-out select-none transform hover:bg-green-500 hover:scale-[1.02] 
                hover:shadow-[0_0_20px_rgba(34,197,94,0.4)] active:scale-[0.98]">
                Add Expense
            </button>
        </div>

        <div class="mt-8">
            <h2 class="text-2xl text-white font-bold mb-5 text-center">
                Transactions
            </h2>
            <input
                id="search-input"
                type="text"
                placeholder="Search Expense..."
                class="w-full p-3 rounded-lg bg-slate-700 text-white placeholder-gray-400 mb-4"
            />
            <div class="overflow-x-auto">
                <table class="w-full min-w-[700px] text-white text-sm text-center table-fixed border-collapse">
                    <thead>
                        <tr class="bg-slate-700">
                            <th class="p-3 w-1/5 hover:bg-slate-200/20 transition select-none">Expense Name</th>
                            <th class="p-3 w-1/5 hover:bg-slate-200/20 transition select-none">Amount</th>
                            <th class="p-3 w-1/5 hover:bg-slate-200/20 transition select-none">Category</th>
                            <th onclick="toggleDateSort()" class="p-3 w-1/5 cursor-pointer hover:bg-slate-200/20 hover:text-white 
                            transition select-none">
                                <div class="flex items-center justify-center gap-1">
                                    <span>Date</span>
                                    <span id="date-sort-arrow" class="text-xs text-green-400">▼</span>
                                </div>
                            </th>
                            <th class="p-3 w-1/5 hover:bg-slate-200/20 transition select-none">Action</th>
                        </tr>
                    </thead>
                    <tbody id="expenseList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>

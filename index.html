<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-5">

    <div class="bg-slate-800 rounded-3xl shadow-2xl p-10 w-full max-w-4xl">
        <h1 class="text-4xl font-bold text-center text-white mb-8">
            Expense Tracker Pro
        </h1>

        <div class="space-y-4">
            <input
                type="text"
                id="expenseName-input"
                placeholder="Expense Name"
                class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-green-600">

            <input
                type="number"
                id="amount-input"
                placeholder="Amount"
                class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-green-600">

            <select
                id="category-input"
                class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-green-600">
                <option hidden selected>Category</option>
                <option value="food">Food</option>
                <option value="transportation">Transportation</option>
                <option value="bills">Bills</option>
                <option value="shopping">Shopping</option>
            </select>

            <input
                type="date"
                id="date-input"
                class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-green-600">

            <button
                id="expenseBtn-input"
                class="w-full bg-green-600 text-white p-3 rounded-xl hover:bg-green-700 transition">
                Add Expense
            </button>
        </div>

        <div class="mt-8">
            <h2 class="text-2xl text-white font-bold mb-5 text-center">
                Transactions
            </h2>

            <div class="overflow-x-auto">
                <table class="w-full min-w-[700px] text-white text-sm text-center table-fixed border-collapse">
                    <thead>
                        <tr class="bg-slate-700">
                            <th class="p-3 w-1/5">Name</th>
                            <th class="p-3 w-1/5">Amount</th>
                            <th class="p-3 w-1/5">Category</th>
                            <th class="p-3 w-1/5">Date</th>
                            <th class="p-3 w-1/5">Action</th>
                        </tr>
                    </thead>
                    <tbody id="expenseList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
   
    <title>Expense Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>

<body class = "bg-slate-900 min-h-screen flex items-center justify-center">
    <div class = "bg-slate-800 rounded-3xl shadow-2xl p-10 w-full max-w-md">

        <h1 class="text-4xl font-bold text-center text-white mb-8">
            Expense Tracker Pro
        </h1> 

        <div class="space-y-4">
            <input
                type="text"
                id = "expenseName-input"
                placeholder="Expense Name"
                class="w-full p-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-green-600">

            <input
                type="number"
                id = "amount-input"
                placeholder="Amount"
                class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-green-600">

            <select
                id = "category-input" class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-green-600">
                <option hidden selected>Category</option>
                <option value = "food">Food</option>
                <option value = "transportation">Transportation</option>
                <option value = "bills">Bills</option>
                <option value = "shopping">Shopping</option>

            </select>
            
             <input
                type="date"
                id = "date-input"
                class="w-full p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-green-600">

            <button
                id = "expenseBtn-input" class="w-full bg-green-600 text-white p-3 rounded-xl hover:bg-green-700 transition">

                Add Expense

            </button>

        </div>

        <div class="mt-8">

            <h2 class="text-2xl text-white font-bold mb-5">
                Transactions
            </h2>

            <div
                id="expenseList"
                class="space-y-3">
            </div>

        </div> 

    </div>
    
<script src = "script.js"></script>

</body>
</html>

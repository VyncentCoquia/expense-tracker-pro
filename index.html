<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-purple-900 to-slate-800">

        

    <div class="bg-white/10 backdrop-blur-lg border border-white/20 rounded-3xl shadow-2xl p-10 w-full max-w-5xl">
        <h1 class="text-4xl font-bold text-center text-white mb-8">
            Expense Tracker Pro
        </h1>
        <div class="bg-slate-800 rounded-xl p-6 text-center shadow-md mb-[50px]">
            <h2 class="text-gray-300 text-lg">
                Total Expenses
            </h2>

            <h1 id="totalExpense"
                class="text-4xl font-bold text-green-400 mt-2">
                ₱ 0.00
            </h1>
        </div>
        <div class="space-y-4">
            <input
                type="text"
                id="expenseName-input"
                placeholder="Expense Name"
                class="w-full p-3 rounded-xl bg-white/20 text-white placeholder-white/70 border border-white/20 focus:outline-none focus:ring-2 focus:ring-green-400">

            <input
                type="number"
                id="amount-input"
                placeholder="Amount"
                class="w-full p-3 rounded-xl bg-white/20 text-white placeholder-white/70 border border-white/20 focus:outline-none focus:ring-2 focus:ring-green-400">

            <select
                id="category-input"
                class="w-full p-3 rounded-xl bg-white/20 text-black border border-white/20 focus:outline-none focus:ring-2 focus:ring-green-400">
                <option class = "text-white" hidden selected>Category</option>
                <option value="Food">Food</option>
                <option value="Transportation">Transportation</option>
                <option value="Bills">Bills</option>
                <option value="Shopping">Shopping</option>
            </select>

            <input
                type="date"
                id="date-input"
                class="w-full p-3 rounded-xl bg-white/20 text-white placeholder-white/70 border border-white/20 focus:outline-none focus:ring-2 focus:ring-green-400">

            <button
                id="expenseBtn-input"
                class="w-full bg-green-600 text-white font-bold p-3 rounded-xl hover:bg-green-700 transition">
                Add Expense
            </button>
        </div>

        <div class="mt-8">
            <h2 class="text-2xl text-white font-bold mb-5 text-center">
                Transactions
            </h2>

            <div class="overflow-x-auto">
                <table class="w-full min-w-[700px] text-white text-sm text-center table-fixed border-collapse">
                    <thead>
                        <tr class="bg-slate-700">
                            <th class="p-3 w-1/5">Expense Name</th>
                            <th class="p-3 w-1/5">Amount</th>
                            <th class="p-3 w-1/5">Category</th>
                            <th class="p-3 w-1/5">Date</th>
                            <th class="p-3 w-1/5">Action</th>
                        </tr>
                    </thead>
                    <tbody id="expenseList"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
